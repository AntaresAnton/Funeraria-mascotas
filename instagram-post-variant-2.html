<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post (Variant 2) - Funeraria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #2C5F5D;
            --color-secondary: #D9A08B;
            --color-bg: #F4F1EA;
        }
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: auto;
        }

        #insta-canvas-2 {
            width: 1080px;
            height: 810px;
            background-color: var(--color-primary); /* Fondo oscuro */
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            color: #fff;
            
            /* Layout Grid Vertical */
            display: grid;
            grid-template-columns: 45% 55%;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* Máscara Orgánica para la imagen */
        .organic-mask {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            overflow: hidden;
            transition: all 1s ease-in-out;
            animation: breathe 8s infinite alternate;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        @keyframes breathe {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        /* Borde decorativo fino */
        .border-line {
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            pointer-events: none;
        }

        /* Zoom para pantallas pequeñas */
        @media (max-width: 1200px) {
            #insta-canvas-2 {
                zoom: 0.6;
            }
        }
    </style>
</head>
<body>

    <div id="insta-canvas-2">
        
        <!-- Elemento de Fondo: Patrón sutil -->
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 40px 40px;"></div>

        <!-- Borde Decorativo -->
        <div class="border-line"></div>

        <!-- Encabezado sutil -->
        <div class="absolute top-10 w-full text-center z-10">
            <p class="text-[#D9A08B] tracking-[0.4em] text-xs uppercase">Homenaje & Memoria</p>
        </div>

        <!-- COLUMNA IZQUIERDA: IMAGEN -->
        <div class="flex items-center justify-center relative p-8">
            <!-- Círculo decorativo detrás -->
            <div class="absolute w-[350px] h-[350px] rounded-full border border-[#D9A08B]/30 animate-pulse-slow"></div>
            
            <div class="w-[380px] h-[380px] organic-mask relative bg-gray-600 border-4 border-white/10">
                <img src="https://images.unsplash.com/photo-1544568100-847a948585b9?q=80&w=1074&auto=format&fit=crop" 
                     alt="Mascota" 
                     class="absolute inset-0 w-full h-full object-cover">
                     <div class="absolute inset-0 bg-black/10"></div>
            </div>

            <!-- Etiqueta Flotante -->
            <div class="absolute bottom-16 -right-6 bg-[#F4F1EA] text-[#2C5F5D] px-6 py-2 rounded-tl-2xl rounded-br-2xl shadow-xl z-20">
                 <p class="font-serif italic text-lg">Siempre contigo</p>
            </div>
        </div>

        <!-- COLUMNA DERECHA: TEXTO -->
        <div class="flex flex-col justify-center items-start text-left z-10 pr-16 pl-4">
            <h1 class="font-serif text-[56px] leading-[1] mb-6 text-[#F4F1EA]">
                Tu compañero <br>
                <span class="text-[#D9A08B] italic">eterno</span> 
            </h1>
            
            <div class="w-12 h-1 bg-[#D9A08B] mb-6"></div>

            <p class="text-gray-300 text-lg font-light leading-relaxed mb-8">
                Honramos su vida con servicios personalizados de cremación y ánforas conmemorativas.
            </p>

            <div class="flex items-center gap-4">
                <div class="inline-flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-[10px] tracking-wide uppercase">Abierto Ahora</span>
                </div>
                 <p class="font-serif text-xl text-white">+56 9 8765 4321</p>
            </div>
        </div>

    </div>

</body>
</html>
